name: luxand_flutter
description: A Flutter plugin for Luxand SDK integration with Windows platform support.
version: 0.0.1
homepage: https://github.com/ota-jalol/luxand_flutter

environment:
  sdk: '>=2.17.0 <4.0.0'
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is plugin specific.
flutter:
  # This section identifies this Flutter project as a plugin project.
  # The 'pluginClass' and Android/iOS specific settings are used to generate
  # the plugin registrant.dart file.
  plugin:
    platforms:
      windows:
        pluginClass: LuxandFlutterPlugin
        dartPluginClass: LuxandFlutter